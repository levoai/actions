name: Test DAST Scan Action
on:
  pull_request:
    paths:
      - 'dast-scan/**'
      - '.github/workflows/test-dast-scan-action.yml'
  push:
    branches:
      - main
    paths:
      - 'dast-scan/**'
      - '.github/workflows/test-dast-scan-action.yml'
  workflow_dispatch:
    inputs:
      target-url:
        description: 'URL to scan for testing'
        required: false
        default: 'https://juice-shop-spec-building.levoai.app/'

jobs:
  run-dast-scan:
    environment: staging
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Print docker version
        run: docker version
      - name: Run DAST scan action
        id: test-scan
        uses: ./dast-scan
        with:
          # Bracket notation: hyphenated dispatch input names are not valid as github.event.inputs.target-url
          target-url: ${{ github.event.inputs['target-url'] || 'https://juice-shop-spec-building.levoai.app/' }}
          authorization-key: ${{ secrets.LEVOAI_AUTH_KEY }}
          organization-id: ${{ secrets.LEVOAI_ORG_ID }}
          env-id: ${{ secrets.LEVOAI_ENV_ID }}
          saas-url: 'https://api.dev.levo.ai'
          fail-on-severity: 'none'
          send-issues: 'true'
          scan-depth: 'smart'
          timeout: '600'
      - name: Verify action outputs
        if: always()
        run: |
          echo "Testing action outputs..."
          echo "Scan ID: ${{ steps.test-scan.outputs.scan-id }}"
          echo "Findings (total): ${{ steps.test-scan.outputs.findings-count }}"
          echo "Critical: ${{ steps.test-scan.outputs.critical-findings }}"
          echo "High: ${{ steps.test-scan.outputs.high-findings }}"
          echo "Medium: ${{ steps.test-scan.outputs.medium-findings }}"
          echo "Low: ${{ steps.test-scan.outputs.low-findings }}"
          echo "Info: ${{ steps.test-scan.outputs.info-findings }}"
          echo "By severity (JSON): ${{ steps.test-scan.outputs.findings-by-severity }}"
          echo "Report: ${{ steps.test-scan.outputs.scan-report }}"
          echo "Exit code: ${{ steps.test-scan.outputs.exit-code }}"
      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-scan-test-report
          path: reports/
          retention-days: 7
          if-no-files-found: warn
