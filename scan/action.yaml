name: "Levo Action to scan repository for API endpoints"
description: "Scan source code for API endpoints using the Levo Code Scanner and upload OpenAPI specs to the Levo dashboard"
inputs:
  authorization-key:
    description: 'Authorization key for CLI to run. Get it from https://app.levo.ai/settings/keys'
    required: true
  organization-id:
    description: 'Levo Organization ID'
    required: true
  app-name:
    description: 'Application name'
    required: true
  language:
    description: 'Programming language of the repo (java, python, javascript, typescript, c, cpp, php, ruby)'
    required: true
  env-name:
    description: 'Environment name'
    required: false
    default: 'staging'
  saas-url:
    description: 'Levo SaaS API URL to report results back'
    required: false
    default: "https://api.levo.ai"
  scanner-docker-image:
    description: 'Levo Code Scanner Docker image (e.g. `levoai/code-scanner:latest`).'
    required: false
    default: 'levoai/code-scanner:latest'
runs:
  using: 'composite'
  steps:
    - id: run-scan-repo
      run: |
        echo "Scanning '${{ inputs.app-name }}' (language: ${{ inputs.language }}, env: ${{ inputs.env-name }})"
        echo "Using image: ${{ inputs.scanner-docker-image }}"

        set +e
        OUTPUT=$(docker run --rm --name levo-code-scanner \
          --user "$(id -u):$(id -g)" \
          -e LEVO_BASE_URL=${{ inputs.saas-url }} \
          -e TERM=xterm-256color \
          -v "$PWD":/workspace:rw \
          ${{ inputs.scanner-docker-image }} \
          --app-name "${{ inputs.app-name }}" \
          --language ${{ inputs.language }} \
          --env-name ${{ inputs.env-name }} \
          -k ${{ inputs.authorization-key }} \
          -o ${{ inputs.organization-id }} 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"

        if [ $EXIT_CODE -eq 0 ]; then
          echo "Scan succeeded."
          echo "scan-success=true" >> $GITHUB_ENV
        else
          echo "Scan failed with exit code $EXIT_CODE."
          echo "scan-success=false" >> $GITHUB_ENV
          exit 1
        fi
      shell: bash
