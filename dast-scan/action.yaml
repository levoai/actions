name: "Levo.ai DAST Scanner"
description: "Run dynamic application security testing on your web app or API"
author: 'Levo.ai'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  target-url:
    description: 'URL of the application to scan'
    required: true
  authorization-key:
    description: 'Levo.ai API key for advanced features. Get it from https://app.levo.ai/settings/keys'
    required: false
  organization-id:
    description: 'Levo.ai organization ID. Get it from https://app.levo.ai/settings/organization'
    required: false
  saas-url:
    description: 'Levo.ai SaaS base URL'
    required: true
    default: "https://api.levo.ai"
  satellite-url:
    description: 'Levo.ai satellite URL for capturing traffic'
    required: false
    default: 'https://satellite.levo.ai'
  app-name:
    description: 'Application name for Levo integration'
    required: false
  app-id:
    description: 'Application ID for Levo integration'
    required: false
  env-name:
    description: 'Environment name for Levo integration (resolved to env-id automatically via the platform API)'
    required: false
  env-id:
    description: 'Environment ID for Levo integration. Takes precedence over env-name if both are provided.'
    required: false
  scan-depth:
    description: 'Scan depth: smart or thorough'
    required: false
    default: 'smart'
  fail-on-severity:
    description: 'Fail workflow on findings with this severity or higher: critical, high, medium, or none'
    required: true
    default: 'critical'
  output-format:
    description: 'Report format written to scan-report file: `json` or `sarif`. (Table/quiet are not supported for report outputs; use `extra-args` if your CLI needs them.)'
    required: false
    default: 'json'
  send-issues:
    description: 'Send findings to Levo platform'
    required: false
    default: 'true'
  timeout:
    description: 'Scan timeout in seconds'
    required: false
    default: '1800'
  max-depth:
    description: 'Maximum crawl depth'
    required: false
  max-pages:
    description: 'Maximum pages to crawl'
    required: false
  openai-api-key:
    description: 'OpenAI API key for AI-powered analysis'
    required: false
  anthropic-api-key:
    description: 'Anthropic API key for AI-powered analysis'
    required: false
  extra-args:
    description: 'Additional arguments to pass to shadownet CLI'
    required: false
  levo-docker-image:
    description: 'Shadownet Docker image to use for the action (e.g. `levoai/levoai-shadownet:1.2.3`).'
    required: false
    default: 'levoai/levoai-shadownet:latest'
outputs:
  scan-report:
    description: 'Path to the scan report file (JSON or SARIF)'
    value: ${{ steps.run-dast-scan.outputs.report-path }}
  scan-id:
    description: 'Unique scan ID'
    value: ${{ steps.run-dast-scan.outputs.scan-id }}
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.run-dast-scan.outputs.findings-count }}
  critical-findings:
    description: 'Number of critical findings'
    value: ${{ steps.run-dast-scan.outputs.critical-findings }}
  high-findings:
    description: 'Number of high severity findings'
    value: ${{ steps.run-dast-scan.outputs.high-findings }}
  exit-code:
    description: 'Scan exit code (0=success, non-zero=failure or findings above threshold)'
    value: ${{ steps.run-dast-scan.outputs.exit-code }}

runs:
  using: 'composite'
  steps:
    - id: run-dast-scan
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        LEVOAI_AUTH_KEY: ${{ inputs.authorization-key }}
        LEVOAI_ORG_ID: ${{ inputs.organization-id }}
        LEVOAI_BASE_URL: ${{ inputs.saas-url }}
        LEVOAI_SATELLITE_URL: ${{ inputs.satellite-url }}
        LEVOAI_APP_ID: ${{ inputs.app-id }}
        LEVO_APP_NAME: ${{ inputs.app-name }}
        LEVOAI_ENV_ID: ${{ inputs.env-id }}
        LEVO_ENV_NAME: ${{ inputs.env-name }}
        INPUT_TARGET_URL: ${{ inputs.target-url }}
        INPUT_SCAN_DEPTH: ${{ inputs.scan-depth }}
        INPUT_OUTPUT_FORMAT: ${{ inputs.output-format }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_MAX_DEPTH: ${{ inputs.max-depth }}
        INPUT_MAX_PAGES: ${{ inputs.max-pages }}
        INPUT_SEND_ISSUES: ${{ inputs.send-issues }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
        INPUT_FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
      run: |
        set +e

        REPORTS_DIR="${{ github.workspace }}/reports"
        LEVO_HOME="${{ runner.temp }}/levo-home"
        mkdir -p "$REPORTS_DIR" "$LEVO_HOME/.config/configstore" "$LEVO_HOME/.shadownet"

        LEVO_IMAGE="${{ inputs.levo-docker-image }}"
        echo "Pulling Docker image: $LEVO_IMAGE"
        docker pull "$LEVO_IMAGE"

        # Authenticate with Levo if credentials are provided
        if [ -n "$LEVOAI_AUTH_KEY" ] && [ -n "$LEVOAI_ORG_ID" ]; then
          echo "Authenticating with Levo..."
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/levo-home \
            -v "$LEVO_HOME:/tmp/levo-home" \
            -e LEVOAI_AUTH_KEY \
            -e LEVOAI_ORG_ID \
            -e LEVOAI_BASE_URL \
            "$LEVO_IMAGE" \
            login -k "$LEVOAI_AUTH_KEY" -o "$LEVOAI_ORG_ID"
          LOGIN_EXIT=$?
          if [ "$LOGIN_EXIT" -ne 0 ]; then
            echo "::error::Levo login failed (exit $LOGIN_EXIT). Verify authorization-key, organization-id, and saas-url match your org."
            exit "$LOGIN_EXIT"
          fi
        fi

        # Determine report file extension
        if [ "$INPUT_OUTPUT_FORMAT" = "sarif" ]; then
          REPORT_NAME="scan-report.sarif"
        else
          REPORT_NAME="scan-report.json"
        fi

        # Build command arguments safely as an array
        DOCKER_ARGS=(
          docker run --rm
          --user "$(id -u):$(id -g)"
          -e HOME=/tmp/levo-home
          -v "$LEVO_HOME:/tmp/levo-home"
          -v "$REPORTS_DIR:/app/reports"
          -e OPENAI_API_KEY
          -e ANTHROPIC_API_KEY
          -e LEVOAI_AUTH_KEY
          -e LEVOAI_ORG_ID
          -e LEVOAI_BASE_URL
          -e LEVOAI_SATELLITE_URL
          -e LEVOAI_APP_ID
          -e LEVO_APP_NAME
          -e LEVOAI_ENV_ID
          -e LEVO_ENV_NAME
          -e PYTHONUNBUFFERED=1
          "$LEVO_IMAGE"
          scan "$INPUT_TARGET_URL"
          --scan-depth "$INPUT_SCAN_DEPTH"
          --output "$INPUT_OUTPUT_FORMAT"
          --timeout "$INPUT_TIMEOUT"
          --output-file "/app/reports/$REPORT_NAME"
          --non-interactive
        )

        # Append optional parameters
        [ -n "$INPUT_MAX_DEPTH" ] && DOCKER_ARGS+=(--max-depth "$INPUT_MAX_DEPTH")
        [ -n "$INPUT_MAX_PAGES" ] && DOCKER_ARGS+=(--max-pages "$INPUT_MAX_PAGES")
        [ -n "$LEVOAI_APP_ID" ]   && DOCKER_ARGS+=(--app-id "$LEVOAI_APP_ID")
        [ -n "$LEVO_APP_NAME" ]   && DOCKER_ARGS+=(--app-name "$LEVO_APP_NAME")
        [ -n "$LEVOAI_ENV_ID" ]   && DOCKER_ARGS+=(--env-id "$LEVOAI_ENV_ID")
        [ -n "$LEVO_ENV_NAME" ]   && DOCKER_ARGS+=(--env-name "$LEVO_ENV_NAME")

        if [ "$INPUT_SEND_ISSUES" = "true" ] && [ -n "$LEVOAI_AUTH_KEY" ] && [ -n "$LEVOAI_ORG_ID" ]; then
          DOCKER_ARGS+=(--send-issues)
        fi

        # Extra args are intentionally word-split here
        if [ -n "$INPUT_EXTRA_ARGS" ]; then
          read -ra EXTRA <<< "$INPUT_EXTRA_ARGS"
          DOCKER_ARGS+=("${EXTRA[@]}")
        fi

        echo "Scan Configuration:"
        echo "  Target: $INPUT_TARGET_URL"
        [ -n "$LEVO_APP_NAME" ]   && echo "  App Name: $LEVO_APP_NAME"
        [ -n "$LEVOAI_ENV_ID" ]   && echo "  Env ID: ***"
        [ -n "$LEVO_ENV_NAME" ]   && echo "  Env Name: $LEVO_ENV_NAME"
        echo "  Satellite URL: ${LEVOAI_SATELLITE_URL:-not set}"
        echo "  Base URL: ${LEVOAI_BASE_URL:-not set}"
        [ -n "$LEVOAI_AUTH_KEY" ] && [ -n "$LEVOAI_ORG_ID" ] && echo "  Auth: Authenticated with Levo"
        echo ""

        echo "Starting scan..."
        "${DOCKER_ARGS[@]}"
        SCAN_EXIT_CODE=$?

        # Locate the report file
        REPORT_FILE="$REPORTS_DIR/$REPORT_NAME"

        if [ -f "$REPORT_FILE" ]; then
          echo "Report found: $REPORT_FILE"
          echo "report-path=$REPORT_FILE" >> "$GITHUB_OUTPUT"

          if [[ "$REPORT_FILE" == *.json ]]; then
            if command -v jq &> /dev/null; then
              FINDINGS_COUNT=$(jq '.findings.total // 0' "$REPORT_FILE" 2>/dev/null || echo "0")
              CRITICAL_COUNT=$(jq '.findings.by_severity.critical // 0' "$REPORT_FILE" 2>/dev/null || echo "0")
              HIGH_COUNT=$(jq '.findings.by_severity.high // 0' "$REPORT_FILE" 2>/dev/null || echo "0")
              SCAN_ID=$(jq -r '.scan_id // "unknown"' "$REPORT_FILE" 2>/dev/null || echo "unknown")
            else
              FINDINGS_COUNT=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('findings',{}).get('total',0))" "$REPORT_FILE" 2>/dev/null || echo "0")
              CRITICAL_COUNT=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('findings',{}).get('by_severity',{}).get('critical',0))" "$REPORT_FILE" 2>/dev/null || echo "0")
              HIGH_COUNT=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('findings',{}).get('by_severity',{}).get('high',0))" "$REPORT_FILE" 2>/dev/null || echo "0")
              SCAN_ID=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('scan_id','unknown'))" "$REPORT_FILE" 2>/dev/null || echo "unknown")
            fi

            echo "findings-count=$FINDINGS_COUNT" >> "$GITHUB_OUTPUT"
            echo "critical-findings=$CRITICAL_COUNT" >> "$GITHUB_OUTPUT"
            echo "high-findings=$HIGH_COUNT" >> "$GITHUB_OUTPUT"
            echo "scan-id=$SCAN_ID" >> "$GITHUB_OUTPUT"

            echo "Results: $FINDINGS_COUNT total, $CRITICAL_COUNT critical, $HIGH_COUNT high"
          elif [[ "$REPORT_FILE" == *.sarif ]]; then
            echo "findings-count=0" >> "$GITHUB_OUTPUT"
            echo "critical-findings=0" >> "$GITHUB_OUTPUT"
            echo "high-findings=0" >> "$GITHUB_OUTPUT"
            echo "scan-id=unknown" >> "$GITHUB_OUTPUT"
            echo "SARIF report written; severity counts are not extracted (use output-format json for findings outputs or consume the SARIF file)."
          fi
        else
          echo "Report file not found at $REPORT_FILE"
          ls -la "$REPORTS_DIR" 2>/dev/null || echo "Reports directory does not exist"
          if [ "$SCAN_EXIT_CODE" -ne 0 ]; then
            echo "::error::Scan exited with code $SCAN_EXIT_CODE before writing a report. Check logs above (credentials, env-id, target URL, network). If login succeeded, the failure is usually during the scan phase."
          else
            echo "::error::Scan reported success (exit 0) but no report file was written at $REPORT_FILE — unexpected; check container permissions and --output-file path."
          fi
          echo "report-path=" >> "$GITHUB_OUTPUT"
          echo "findings-count=0" >> "$GITHUB_OUTPUT"
          echo "critical-findings=0" >> "$GITHUB_OUTPUT"
          echo "high-findings=0" >> "$GITHUB_OUTPUT"
          echo "scan-id=unknown" >> "$GITHUB_OUTPUT"
        fi

        echo "exit-code=$SCAN_EXIT_CODE" >> "$GITHUB_OUTPUT"

        # Apply fail-on-severity logic
        if [ "$INPUT_FAIL_ON_SEVERITY" != "none" ]; then
          case "$INPUT_FAIL_ON_SEVERITY" in
            critical)
              if [ "${CRITICAL_COUNT:-0}" -gt 0 ]; then
                echo "::error::Found $CRITICAL_COUNT critical severity findings"
                exit 1
              fi
              ;;
            high)
              if [ "${CRITICAL_COUNT:-0}" -gt 0 ] || [ "${HIGH_COUNT:-0}" -gt 0 ]; then
                echo "::error::Found $(( ${CRITICAL_COUNT:-0} + ${HIGH_COUNT:-0} )) high or critical severity findings"
                exit 1
              fi
              ;;
            medium)
              if [ "$SCAN_EXIT_CODE" -ne 0 ]; then
                echo "::error::Scan failed or found findings at medium severity or higher"
                exit "$SCAN_EXIT_CODE"
              fi
              ;;
          esac
        fi

        exit "$SCAN_EXIT_CODE"
